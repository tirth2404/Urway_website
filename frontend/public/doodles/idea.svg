<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <style>
    @keyframes sparkPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    @keyframes bulbGlow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    
    .spark {
      animation: sparkPulse 2s ease-in-out infinite;
    }
    
    .spark:nth-child(2) { animation-delay: 0.3s; }
    .spark:nth-child(3) { animation-delay: 0.6s; }
    .spark:nth-child(4) { animation-delay: 0.9s; }
    .spark:nth-child(5) { animation-delay: 1.2s; }
    .spark:nth-child(6) { animation-delay: 1.5s; }
    
    .bulb-glow {
      animation: bulbGlow 2s ease-in-out infinite;
    }
  </style>
  
  <!-- Background rounded rectangle -->
  <rect width="400" height="400" rx="80" fill="#FFE4E6"/>
  
  <!-- Person body -->
  <ellipse cx="260" cy="280" rx="45" ry="60" fill="#18181B" stroke="#18181B" stroke-width="3"/>
  
  <!-- Person head -->
  <circle cx="260" cy="190" r="35" fill="#FFE4E6" stroke="#18181B" stroke-width="3"/>
  
  <!-- Person hair -->
  <path d="M230 175 Q235 160 250 165 Q260 150 270 165 Q285 160 290 175" fill="#18181B"/>
  
  <!-- Person smile -->
  <path d="M245 195 Q260 205 275 195" fill="none" stroke="#18181B" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <circle cx="250" cy="185" r="3" fill="#18181B"/>
  <circle cx="270" cy="185" r="3" fill="#18181B"/>
  
  <!-- Arm holding bulb -->
  <path d="M220 235 Q180 230 160 210" fill="none" stroke="#18181B" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Hand -->
  <circle cx="155" cy="205" r="12" fill="#FFE4E6" stroke="#18181B" stroke-width="3"/>
  
  <!-- Lightbulb -->
  <g class="bulb-glow">
    <!-- Bulb glass -->
    <ellipse cx="130" cy="140" rx="35" ry="45" fill="#FFF" stroke="#18181B" stroke-width="3"/>
    
    <!-- Filament -->
    <path d="M120 135 Q130 125 140 135 Q130 145 120 135" fill="none" stroke="#18181B" stroke-width="2"/>
    
    <!-- Bulb base -->
    <rect x="110" y="180" width="40" height="15" rx="3" fill="#18181B"/>
    <line x1="115" y1="190" x2="145" y2="190" stroke="#FFE4E6" stroke-width="2"/>
  </g>
  
  <!-- Animated sparks around bulb -->
  <g>
    <line class="spark" x1="80" y1="110" x2="95" y2="120" stroke="#18181B" stroke-width="3" stroke-linecap="round"/>
    <line class="spark" x1="70" y1="140" x2="85" y2="140" stroke="#18181B" stroke-width="3" stroke-linecap="round"/>
    <line class="spark" x1="80" y1="170" x2="95" y2="160" stroke="#18181B" stroke-width="3" stroke-linecap="round"/>
    <line class="spark" x1="165" y1="105" x2="175" y2="115" stroke="#18181B" stroke-width="3" stroke-linecap="round"/>
    <line class="spark" x1="175" y1="140" x2="190" y2="140" stroke="#18181B" stroke-width="3" stroke-linecap="round"/>
    <line class="spark" x1="170" y1="170" x2="180" y2="160" stroke="#18181B" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Waving hand -->
  <path d="M300 240 Q340 235 360 215" fill="none" stroke="#18181B" stroke-width="8" stroke-linecap="round"/>
  <circle cx="365" cy="210" r="12" fill="#FFE4E6" stroke="#18181B" stroke-width="3"/>
  
  <!-- Fingers waving -->
  <path d="M362 200 L358 188 M368 198 L368 186 M374 200 L372 188" stroke="#18181B" stroke-width="2" stroke-linecap="round"/>
</svg>
